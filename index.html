<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille Lab | Graphisme</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header__logo">
            <img src="logocamille.png" alt="Logo">
        </div>
        <nav>
            <ul class="nav-list">
                <li><a href="#" id="link-accueil" class="nav-link">Accueil</a></li>
                <li class="nav-sep">|</li>
                <li><a href="#" id="link-projets" class="nav-link">Voir mes projets</a></li>
                <li class="nav-sep">|</li>
                <li><a href="#" class="nav-link">À Propos</a></li>
                <li class="nav-sep">|</li>
                <li><a href="#" class="nav-link">Tarifs</a></li>
                <li class="nav-sep">|</li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-wrapper">
        <section id="view-home" class="page-view">
            <h1 class="hero-title">LE GRAPHISME AU SERVICE DE LA TERRE</h1>
            <div class="bubble">
                <p>« Ma mission : cultivons ensemble votre image de marque »</p>
            </div>
        </section>

        <section id="view-projects" class="page-view projects-bg">
            <img src="feuille1.png" class="leaf leaf-left">
            <img src="feuille2.png" class="leaf leaf-right">
            
            <h2 class="projects-title">"De la graine à l'image : mes dernières réalisations."</h2>
            
            <div class="portfolio-grid">
                <div class="card"></div><div class="card"></div><div class="card"></div><div class="card"></div>
                <div class="card"></div><div class="card"></div><div class="card"></div><div class="card"></div>
            </div>
        </section>

        <div id="gallery-overlay" class="overlay">
            <button class="close-btn">&times;</button>
            <button class="arrow arrow-prev">‹</button>
            <div class="gallery-card">
                <div class="img-box"><img src="projet1.jpg" id="gallery-img"></div>
                <div class="text-box">
                    <h3 id="gallery-title">TITRE PROJET</h3>
                    <div class="divider"></div>
                    <p id="gallery-desc">Détails de la réalisation...</p>
                </div>
            </div>
            <button class="arrow arrow-next">›</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
