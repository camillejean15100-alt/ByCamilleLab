<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <img src="logocamille.png" alt="Logo" class="logo">
        <nav class="navigation">
            <a href="#">Accueil</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main id="accueil" class="view">
        <h1>Créativité & Design</h1>
        <p class="mission">Accompagner vos projets avec passion et précision.</p>
        
        <div class="services-grid">
            <div class="card">
                <img src="panneaux.png" alt="Design">
                <p>DESIGN</p>
            </div>
            <div class="card">
                <img src="panier.png" alt="Boutique">
                <p>BOUTIQUE</p>
            </div>
            <div class="card">
                <img src="plante.png" alt="Nature">
                <p>NATURE</p>
            </div>
            <div class="card">
                <img src="zoom.png" alt="Stratégie">
                <p>STRATÉGIE</p>
            </div>
        </div>
    </main>

    <section id="portfolio" class="view">
        <h2 class="port-title">Mon Portfolio</h2>
        <div class="grid-portfolio">
            <div class="box"><img src="certif.png" alt="Projet" style="width:100%;height:100%;object-fit:cover;border-radius:15px;"></div>
            <div class="box"><img src="coccinelle.png" alt="Projet" style="width:100%;height:100%;object-fit:cover;border-radius:15px;"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </section>

    <section id="contact" class="view">
        <h2 class="port-title">Contactez-moi</h2>
        <div class="card">
            <img src="mail.jpg" alt="Email">
            <p>camille@exemple.com</p>
        </div>
    </section>

</body>
</html>
