<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille Lab - Le Graphisme au service de la Terre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="hero-section">
        <header>
            <img src="logocamille.png" class="logo" alt="Camille Lab">
            <nav>
                <ul>
                    <li><a href="#" class="active">Accueil</a></li>
                    <li><a href="#">Voir mes projets</a></li>
                    <li><a href="#">À Propos</a></li>
                    <li><a href="#">Tarifs</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </header>

        <section class="headline">
            <h1>LE GRAPHISME AU SERVICE DE LA TERRE</h1>
        </section>

        <section class="services">
            <div class="card">
                <img src="certif.png" alt="Certification">
                <p>Un logo et une image de marque qui vous ressemblent.</p>
            </div>
            <div class="card">
                <img src="panier.png" alt="Packaging">
                <p>Création d'étiquettes & de packagings pour vos produits.</p>
            </div>
            <div class="card">
                <img src="panneaux.png" alt="Supports">
                <p>Panneaux & supports pour rendre votre ferme visible.</p>
            </div>
        </section>

        <img src="profil-photo.png" class="perso" alt="Camille">
        <img src="plante.png" class="deco-l" alt="Fleur gauche">
        <img src="plante.png" class="deco-r" alt="Fleur droite">
    </main>

    <script src="script.js"></script>
</body>
</html>
