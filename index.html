<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Camille Lab | Graphisme</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header__logo">
            <img src="logocamille.png" alt="Camille Lab">
        </div>
        <nav class="header__nav">
            <a href="#accueil" class="nav-link" id="btn-accueil">Accueil</a>
            <span class="nav-sep">|</span>
            <a href="#projets" class="nav-link" id="btn-projets">Voir mes projets</a>
            <span class="nav-sep">|</span>
            <a href="#propos" class="nav-link" id="btn-propos">À Propos</a>
            <span class="nav-sep">|</span>
            <a href="#tarifs" class="nav-link" id="btn-tarifs">Tarifs</a>
            <span class="nav-sep">|</span>
            <a href="#contact" class="nav-link" id="btn-contact">Contact</a>
        </nav>
    </header>

    <main id="accueil" class="hero">
        <h1 class="hero__title">LE GRAPHISME AU SERVICE DE LA TERRE</h1>
        <div class="bubble">
            <p class="bubble__text">« ma mission : cultivons ensemble votre image de marque »</p>
        </div>
    </main>

    <section id="projets" class="projects-section">
        <div class="portfolio-grid">
            <a href="#view1" class="project-card"><img src="projet1.jpg"></a>
            <a href="#view2" class="project-card"><img src="projet2.jpg"></a>
            <a href="#view3" class="project-card"><img src="projet3.jpg"></a>
        </div>
    </section>

    <div id="view1" class="gallery-overlay">
        <a href="#projets" class="close">×</a>
        <div class="modal-content">
            <img src="projet1.jpg">
            <h3>PROJET 1</h3>
            <p>Description simple en Californian FB.</p>
        </div>
    </div>

    <div id="view2" class="gallery-overlay">
        <a href="#projets" class="close">×</a>
        <div class="modal-content">
            <img src="projet2.jpg">
            <h3>PROJET 2</h3>
            <p>Description simple en Californian FB.</p>
        </div>
    </div>

</body>
</html>
