<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille Lab | Graphisme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <img src="logocamille.png" alt="Logo" class="logo">
        <nav class="navigation">
            <a href="#accueil">Accueil</a>
            <a href="#portfolio">Voir mes projets</a>
            <a href="#propos">À Propos</a>
            <a href="#tarifs">Tarifs</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section id="accueil" class="view">
        <div class="hero-content">
            <h1>LE GRAPHISME AU SERVICE DE LA TERRE</h1>
            
            <div class="services-row">
                <div class="info-bubble">
                    <img src="certif.png" alt="Logo">
                    <p>Un logo et une image de marque qui vous ressemblent.</p>
                </div>
                <div class="info-bubble">
                    <img src="panier.png" alt="Packaging">
                    <p>Création d'étiquettes & de packagings pour vos produits.</p>
                </div>
                <div class="info-bubble">
                    <img src="panneaux.png" alt="Supports">
                    <p>Panneaux & supports pour rendre votre ferme visible.</p>
                </div>
            </div>
        </div>
        <img src="fondaccueil.jpg" class="full-bg-img">
    </section>

    <section id="portfolio" class="view">
        <h2 class="section-title">Mes Projets</h2>
        <div class="grid-portfolio">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </section>

    <section id="propos" class="view"><h2 class="section-title">À Propos</h2></section>
    <section id="tarifs" class="view"><h2 class="section-title">Tarifs</h2></section>
    <section id="contact" class="view"><h2 class="section-title">Contact</h2></section>

</body>
</html>
