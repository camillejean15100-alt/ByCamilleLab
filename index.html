<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille Lab | Graphisme Éco-responsable</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="radio" name="main-nav" id="tab-accueil" checked>
    <input type="radio" name="main-nav" id="tab-projets">
    <input type="radio" name="main-nav" id="tab-propos">
    <input type="radio" name="main-nav" id="tab-tarifs">
    <input type="radio" name="main-nav" id="tab-contact">

    <header class="navbar">
        <div class="logo">
            <img src="logocamille.png" alt="Camille Lab">
        </div>
        <nav>
            <ul>
                <li><label for="tab-accueil">Accueil</label></li>
                <li><label for="tab-projets">Voir mes projets</label></li>
                <li><label for="tab-propos">À Propos</label></li>
                <li><label for="tab-tarifs">Tarifs</label></li>
                <li><label for="tab-contact">Contact</label></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">

        <section class="page-section" id="section-accueil">
            <h1 class="title-main">LE GRAPHISME AU SERVICE DE LA TERRE</h1>
            <div class="hero-content">
                <div class="char-wrapper">
                    <img src="profil-photo.png" alt="Camille" class="img-camille">
                    <div class="bubble">
                        <p>« ma mission : cultivons ensemble votre image de marque »</p>
                    </div>
                </div>
            </div>
            <img src="coccinelle.png" class="decor-bug" alt="">
        </section>

        <section class="page-section" id="section-projets">
            <h2 class="title-sec">MON PORTFOLIO</h2>
            <div class="gallery-grid">
                <div class="gallery-card">
                    <img src="voirmesprojets.jpg" alt="Projet">
                    <div class="hover-zoom"><img src="zoom.png" alt="Zoom"></div>
                </div>
                <div class="gallery-card">
                    <img src="panier.png" alt="E-commerce">
                    <div class="hover-zoom"><img src="zoom.png" alt="Zoom"></div>
                </div>
                <div class="gallery-card">
                    <img src="certif.png" alt="Certifications">
                    <div class="hover-zoom"><img src="zoom.png" alt="Zoom"></div>
                </div>
            </div>
            <img src="traitcoccinelle.png" class="decor-line" alt="">
        </section>

        <section class="page-section" id="section-propos">
            <h2 class="title-sec">À PROPOS</h2>
            <div class="about-flex">
                <img src="plante.png" class="img-about" alt="Plante">
                <p class="text-content">Graphiste passionnée par le vivant, j'accompagne vos projets avec une approche durable.</p>
            </div>
        </section>

        <section class="page-section" id="section-tarifs">
            <h2 class="title-sec">NOS TARIFS</h2>
            <div class="tarifs-container">
                <img src="panneaux.png" alt="Panneaux Tarifs" class="img-tarifs">
            </div>
        </section>

        <section class="page-section" id="section-contact">
            <h2 class="title-sec">ME CONTACTER</h2>
            <div class="contact-box">
                <img src="mail.jpg" alt="Email" class="img-contact">
                <div class="socials">
                    <img src="reseaux-sociaux.png" alt="Suivez-moi">
                </div>
            </div>
        </section>

    </main>

    <div class="site-bg"></div>

</body>
</html>
