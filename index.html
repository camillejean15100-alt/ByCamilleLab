<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille Lab | Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="fixed-bg"></div>

    <header class="navbar">
        <div class="logo">
            <img src="logocamille.png" alt="Camille Lab">
        </div>
        
        <nav>
            <ul class="nav-links">
                <li><a href="#accueil">Accueil</a></li>
                <li><a href="#projets">Voir mes projets</a></li>
                <li><a href="#propos">À Propos</a></li>
                <li><a href="#tarifs">Tarifs</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
        <section id="accueil" class="section active">
            <h1 class="main-title">LE GRAPHISME AU SERVICE DE LA TERRE</h1>
            
            <div class="hero-layout">
                <div class="illustration-container">
                    <img src="profil-photo.png" alt="Camille" class="character-img">
                    
                    <div class="speech-bubble">
                        <p>« ma mission : <br> cultivons ensemble votre image de marque »</p>
                    </div>
                </div>
            </div>

            <img src="coccinelle.png" class="bug" alt="">
        </section>

        <section id="projets" class="section"></section>
        <section id="propos" class="section"></section>
        <section id="tarifs" class="section"></section>
        <section id="contact" class="section"></section>

    </main>

</body>
</html>
